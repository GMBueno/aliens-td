<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alien Armory Defense</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="main-menu" id="main-menu">
        <div class="menu-card">
          <div class="menu-head">
            <h1>Mission Selector</h1>
          </div>
          <div class="level-grid" id="level-grid"></div>
          <button class="primary-button" id="menu-play-button" type="button" disabled>Play</button>
        </div>
      </section>

      <section class="game-screen hidden" id="game-screen">
        <header class="hud hud-top">
          <div class="hud-group">
            <div class="hud-chip lives-chip" title="Lives"><span class="icon heart"></span><strong id="lives-value">0</strong></div>
            <div class="hud-chip gold-chip" title="Gold"><span class="coin"></span><strong id="gold-value">0</strong></div>
            <button class="hud-chip player-chip" id="player-level-button" type="button">
              <span>LVL</span>
              <strong id="player-level-value">1</strong>
              <i id="player-xp-bar"></i>
            </button>
          </div>
          <div class="hud-group center">
            <div class="hud-chip mission-chip wide"><span>MISSION</span><strong id="mission-value">1-1</strong></div>
            <div class="hud-chip wave-chip"><span>WAVE</span><strong id="wave-value">0 / 0</strong></div>
            <div class="hud-chip kills-chip"><span class="skull"></span><strong id="kills-value">0 / 0</strong></div>
          </div>
          <div class="hud-group">
            <button class="control-button speed-state" id="speed-toggle-button" type="button" title="Game Speed">1x</button>
            <button class="control-button icon-control pause-icon" id="play-pause-button" type="button" title="Pause" aria-label="Pause"></button>
            <button class="control-button gear-button" id="gear-button" type="button" title="Menu">Gear</button>
          </div>
        </header>

        <section class="arena-wrap">
          <canvas id="game-canvas" width="1280" height="720"></canvas>
          <aside class="tower-sidebar hidden" id="tower-sidebar">
            <div class="tower-sidebar-head">
              <div>
                <p>Tower Stats</p>
                <h2 id="tower-sidebar-title">Weapon</h2>
              </div>
              <button class="icon-button compact" id="tower-sidebar-close-button" type="button" aria-label="Close tower stats">×</button>
            </div>
            <div class="weapon-stat-list" id="tower-stat-list"></div>
          </aside>
        </section>

        <footer class="hud hud-bottom">
          <button class="ability-card" id="time-stop-button" type="button">
            <span class="hourglass"></span>
            <strong>Time Stop</strong>
            <small id="time-stop-status">Ready</small>
          </button>
          <div class="weapon-bar" id="weapon-bar"></div>
        </footer>
      </section>

      <section class="modal-backdrop hidden" id="pause-modal">
        <div class="pause-card">
          <p>Command Menu</p>
          <button class="primary-button" id="resume-button" type="button">Resume</button>
          <button class="secondary-button" id="restart-button" type="button">Restart</button>
          <button class="secondary-button" id="change-level-button" type="button">Change Level</button>
        </div>
      </section>

      <section class="modal-backdrop hidden" id="result-modal">
        <div class="pause-card">
          <p id="result-title">Mission Complete</p>
          <span id="result-copy"></span>
          <button class="primary-button" id="result-restart-button" type="button">Restart</button>
          <button class="secondary-button" id="result-levels-button" type="button">Change Level</button>
        </div>
      </section>

      <section class="modal-backdrop hidden" id="weapon-info-modal">
        <div class="weapon-info-card">
          <div class="weapon-info-head">
            <div>
              <p>Weapon Inventory</p>
              <h2 id="weapon-info-title">Weapon</h2>
            </div>
            <button class="icon-button" id="weapon-info-close-button" type="button" aria-label="Close weapon info">×</button>
          </div>
          <div class="weapon-info-body">
            <section class="inventory-grid" id="weapon-inventory-grid"></section>
            <section class="weapon-stat-panel">
              <div class="weapon-stat-list" id="weapon-stat-list"></div>
              <div class="weapon-info-actions">
                <button class="primary-button" id="weapon-equip-button" type="button" disabled>Equip</button>
                <button class="secondary-button" id="weapon-destroy-button" type="button" disabled>Destroy</button>
              </div>
            </section>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
